name: mintday
description: "记录我正在成为谁——目标规划 + 日常打卡成长手帐"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  # 本地数据库（移动端/桌面）
  sqflite: ^2.4.2
  # Web 平台 SQLite 支持
  sqflite_common_ffi_web: ^1.1.1
  # 文件路径管理
  path_provider: ^2.1.5
  # UUID 生成
  uuid: ^4.5.1
  # 状态管理
  provider: ^6.1.5
  # 图片选择（打卡证据）
  image_picker: ^1.1.2
  # 日期格式化
  intl: ^0.20.2
  # 文件路径拼接
  path: ^1.9.1
  # 本地推送通知
  flutter_local_notifications: ^18.0.1
  # 时区支持（通知调度必须）
  timezone: ^0.9.4
  # 本地持久化（通知开关/时间）
  shared_preferences: ^2.5.2
  # 分享卡截图 + 系统分享
  screenshot: ^3.0.0
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
